<!DOCTYPE html>
<meta charset="UTF-8">
<title>播放</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a1a;color:#fff;font-family:Arial}
  .container{max-width:1600px;margin:0 auto;padding:30px;display:flex;gap:30px;flex-wrap:wrap}
  .player{flex:1;min-width:700px}
  .back{color:#e63946;margin-bottom:10px;cursor:pointer;display: flex;align-items: center;}
  .video{width:100%;height:42rem;background:#000;border-radius:12px}
  .list{width:320px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .episode{padding:12px;background:#2a2a2a;border-radius:6px;text-align:center;cursor:pointer}
  .episode.active{background:#e63946}
</style>

<div class="container">
  <div class="player">
    <div class="back" onclick="history.back()"><img src="./back.png" alt="后退" style="width:16px;height:16px;margin-right:4px">后退</div>
    <h2 id="title" style="margin:10px 0">加载中...</h2>
    <video id="video" class="video" controls></video>
  </div>
  <div class="list">
    <h3>剧集列表</h3>
    <div id="grid" class="grid"></div>
  </div>
</div>

<script>
  const drama = new URLSearchParams(location.search).get('drama');
  const video = document.getElementById('video');
  const grid = document.getElementById('grid');
  const title = document.getElementById('title');

  fetch(`/api/list?drama=${drama}`)
    .then(r => r.json())
    .then(list => {
      list.forEach((it, i) => {
        const div = document.createElement('div');
        div.className = 'episode';
        div.innerText = it.num;
        div.onclick = () => {
          document.querySelectorAll('.episode').forEach(e => e.classList.remove('active'));
          div.classList.add('active');
          video.src = `/video/${drama}/${it.file}`;
          video.play();
          title.innerText = `第${drama}部 - 第${it.num}集`;
        };
        grid.appendChild(div);
      });
      if (list.length) grid.children[0].click();
    });
</script>
